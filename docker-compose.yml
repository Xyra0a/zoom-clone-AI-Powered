version: '3.8'

services:
  backend:
    build: .
    container_name: zoom-clone-backend
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_here}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24}
      PORT: ${PORT:-8080}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zoom_clone
    depends_on:
      - postgres
    volumes:
      - .:/app
    command: go run main.go
    networks:
      - zoom-network

  postgres:
    image: postgres:15-alpine
    container_name: zoom-clone-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zoom_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zoom-network

volumes:
  postgres_data:

networks:
  zoom-network:
    driver: bridge
